---
# handlers file for mongodb
- name: Restart mongodb service
  ansible.builtin.systemd:
    name: mongod
    state: restarted
    enabled: true
    daemon_reload: true
- name: Configure enable-transparent-hugepages
  ansible.builtin.systemd:
    name: enable-transparent-hugepages
    state: started
    enabled: true
