---
# Argument Specifications for ansible-mongodb
# This file defines the expected arguments and their types for the role.

argument_specs:
  main:
    short_description: Main entry point for the ansible-mongodb role
    options:
      mongodb_version:
        type: str
        required: true
        description: MongoDB version to install (e.g., '7.0', '8.0')
      config_path:
        type: str
        required: false
        description: Path to the MongoDB configuration file
      key:
        type: dict
        required: true
        description: Mapping of MongoDB versions to their public key IDs
      disable_transparent_hugepages:
        type: bool
        required: false
        default: true
        description: Whether to disable Transparent Huge Pages (THP) for MongoDB < 8.0
      enable_transparent_hugepages:
        type: bool
        required: false
        default: false
        description: Whether to enable Transparent Huge Pages (THP) for MongoDB >= 8.0
      # ansible_distribution:
      #   type: str
      #   required: true
      #   description: Linux distribution (e.g., 'Ubuntu', 'Debian')
      # ansible_distribution_release:
      #   type: str
      #   required: true
      #   description: Distribution release codename (e.g., 'focal', 'buster')
